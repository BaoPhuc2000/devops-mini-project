name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

# Thêm quyền truy cập nội dung cho Pipeline
permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Cập nhật lên v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3 # Cập nhật lên v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # Đảm bảo đường dẫn ./app là đúng so với vị trí file deploy.yml
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/my-devops-app:latest ./app
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/my-devops-app:latest